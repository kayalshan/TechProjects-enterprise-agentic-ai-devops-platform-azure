name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build and test
        run: mvn clean install -DskipTests
      - name: Build Docker images
        run: docker-compose build
      - name: Push Docker images (example placeholder)
        run: echo "Add Docker registry push commands here"