server:
  port: 8084

spring:
  application:
    name: agent-orchestrator
  profiles:
    active: dev
  jackson:
    serialization:
      INDENT_OUTPUT: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO