server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: llm-service
          uri: http://localhost:8081
          predicates:
            - Path=/llm/**
        - id: rag-service
          uri: http://localhost:8082
          predicates:
            - Path=/rag/**
        - id: tools-service
          uri: http://localhost:8083
          predicates:
            - Path=/tools/**