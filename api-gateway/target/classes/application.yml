server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      routes:
        - id: agent-orchestrator
          uri: ${gateway.agent-orchestrator-url}
          predicates:
            - Path=/api/orchestrator/**
          filters:
            - StripPrefix=2
        - id: llm-service
          uri: ${gateway.llm-service-url}
          predicates:
            - Path=/api/llm/**
          filters:
            - StripPrefix=2
        - id: rag-service
          uri: ${gateway.rag-service-url}
          predicates:
            - Path=/api/rag/**
          filters:
            - StripPrefix=2
        - id: tools-service
          uri: ${gateway.tools-service-url}
          predicates:
            - Path=/api/tools/**
          filters:
            - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
        - id: tools-service
          uri: http://localhost:8083
          predicates:
            - Path=/tools/**