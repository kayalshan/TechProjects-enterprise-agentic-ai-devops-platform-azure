apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: "enterprise-agentic.local"
      http:
        paths:
          - path: /llm
            pathType: Prefix
            backend:
              service:
                name: llm-service
                port:
                  number: 8120
          - path: /rag
            pathType: Prefix
            backend:
              service:
                name: rag-service
                port:
                  number: 8130
          - path: /tools
            pathType: Prefix
            backend:
              service:
                name: tools-service
                port:
                  number: 8140
          - path: /orchestrator
            pathType: Prefix
            backend:
              service:
                name: agent-orchestrator
                port:
                  number: 8110