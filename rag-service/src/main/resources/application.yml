server:
  port: 8110

spring:
  application:
    name: rag-service
  profiles:
    active: dev

rag:
  provider: ${RAG_PROVIDER:azure}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO